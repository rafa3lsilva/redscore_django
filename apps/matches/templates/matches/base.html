<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}StatsGreen{% endblock %}</title>
    {% load static %}
    <link rel="icon" href="{% static 'img/favicon.png' %}">
    
    <!-- Modern Typography: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Global Stylesheet -->
    <link rel="stylesheet" href="{% static 'css/base.css' %}">

    {% block extra_head %}{% endblock %}
</head>

<body>
    <header>
        <h1>StatsGreen</h1>
        <p>Plataforma de Análises Preditivas de Futebol</p>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© {% now "Y" %} StatsGreen — Todos os direitos reservados ⚽</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.tab');
            const contents = document.querySelectorAll('.tab-content');

            if (tabs.length > 0 && contents.length > 0) {
                // Função para ativar aba
                function activateTab(index) {
                    // Remove active de todos
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));
                    
                    // Adiciona active no selecionado
                    if(tabs[index]) tabs[index].classList.add('active');
                    if(contents[index]) contents[index].classList.add('active');
                }

                // Adiciona evento de click
                tabs.forEach((tab, index) => {
                    tab.addEventListener('click', () => activateTab(index));
                });

                // Ativa a primeira aba por padrão
                activateTab(0);
            }
        });
    </script>
</body>
</html>
